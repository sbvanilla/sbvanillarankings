<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SB Vanilla Chads</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0d1117;
            --nav-bg: #10161e;
            --card: #161b22;
            --card-hover: #1c2330;
            --border: #21262d;
            --border2: #2d333b;
            --text: #e6edf3;
            --muted: #7d8590;
            --muted2: #8b949e;
            --gold: #d4a017;
            --silver: #8b949e;
            --bronze: #c17f24;
            --green: #3fb950;
            --red: #f85149;
            --blue: #58a6ff;
            --purple: #a371f7;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(88,166,255,0.06), transparent),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(93,189,58,0.04), transparent);
        }

        /* ─── NAV ─── */
        nav {
            position: sticky;
            top: 0;
            z-index: 200;
            background: rgba(16, 22, 30, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            height: 62px;
            display: flex;
            align-items: center;
            padding: 0 28px;
            gap: 24px;
        }

        .logo {
            font-family: 'Press Start 2P', monospace;
            font-size: 13px;
            line-height: 1.4;
            color: #5dbd3a;
            text-shadow: 0 0 24px rgba(93,189,58,0.35), 2px 2px 0 #2d5c1a;
            cursor: default;
            user-select: none;
            white-space: nowrap;
        }
        .logo em { color: #f0a500; font-style: normal; }

        .nav-divider { flex: 1; }

        .search-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }
        .search-wrap svg {
            position: absolute;
            left: 11px;
            color: var(--muted);
            pointer-events: none;
            flex-shrink: 0;
        }
        #searchInput {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border2);
            border-radius: 9px;
            padding: 9px 14px 9px 36px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 13.5px;
            width: 230px;
            outline: none;
            transition: border-color .2s, background .2s;
        }
        #searchInput:focus { border-color: var(--blue); background: rgba(88,166,255,0.06); }
        #searchInput::placeholder { color: var(--muted); }

        /* ─── MAIN ─── */
        main {
            max-width: 820px;
            margin: 0 auto;
            padding: 44px 20px 80px;
        }

        .page-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .page-title h1 { font-size: 20px; font-weight: 800; letter-spacing: -.3px; }

        .page-subtitle {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 28px;
        }

        /* ─── PLAYER ROWS ─── */
        #rankingsList { display: flex; flex-direction: column; gap: 7px; }

        .player-row {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 13px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: background .15s, border-color .15s, transform .15s, box-shadow .15s;
            animation: fadeIn .25s ease both;
        }
        .player-row:hover {
            background: var(--card-hover);
            border-color: var(--border2);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        .player-row.rank-1 {
            border-color: rgba(212,160,23,.45);
            background: linear-gradient(110deg, rgba(212,160,23,.09) 0%, var(--card) 60%);
        }
        .player-row.rank-1:hover { background: linear-gradient(110deg, rgba(212,160,23,.14) 0%, var(--card-hover) 60%); }

        .player-row.rank-2 {
            border-color: rgba(180,195,215,.45);
            background: linear-gradient(110deg, rgba(180,195,215,.11) 0%, var(--card) 60%);
        }
        .player-row.rank-2:hover { background: linear-gradient(110deg, rgba(180,195,215,.17) 0%, var(--card-hover) 60%); }

        .player-row.rank-3 {
            border-color: rgba(193,127,36,.35);
            background: linear-gradient(110deg, rgba(193,127,36,.08) 0%, var(--card) 60%);
        }

        /* rank badge */
        .rank-badge {
            width: 40px;
            height: 40px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 16px;
            flex-shrink: 0;
            background: rgba(255,255,255,.05);
            color: var(--muted2);
            border: 1px solid var(--border2);
        }
        .rank-badge.gold   { background: linear-gradient(145deg, #f5c842, #c8860a); color: #fff; border-color: transparent; box-shadow: 0 0 18px rgba(212,160,23,.5); font-size: 18px; }
        .rank-badge.silver { background: linear-gradient(145deg, #d4dae2, #7e8d9e); color: #fff; border-color: transparent; box-shadow: 0 0 16px rgba(180,195,210,.4); font-size: 18px; }
        .rank-badge.bronze { background: linear-gradient(145deg, #e0964a, #a05e18); color: #fff; border-color: transparent; box-shadow: 0 0 14px rgba(193,127,36,.4); font-size: 18px; }

        /* avatar */
        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            flex-shrink: 0;
            image-rendering: pixelated;
            background: #21262d;
            border: 1px solid var(--border2);
        }

        /* player info */
        .player-info { flex: 1; min-width: 0; }

        .name-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 7px;
            margin-bottom: 3px;
        }
        .player-name {
            font-size: 16px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .player-tag {
            font-size: 9.5px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: .6px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .player-sub {
            font-size: 12.5px;
            color: var(--muted2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .player-sub em { opacity: .7; font-style: italic; }

        /* points */
        .player-points {
            text-align: right;
            flex-shrink: 0;
        }
        .player-points .pts-val {
            font-size: 15px;
            font-weight: 700;
            display: block;
            color: var(--text);
        }
        .player-points .pts-label {
            font-size: 10.5px;
            color: var(--muted);
        }

        /* change */
        .change-badge {
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: 12.5px;
            font-weight: 700;
            padding: 5px 10px;
            border-radius: 8px;
            flex-shrink: 0;
            min-width: 54px;
            justify-content: center;
        }
        .ch-up   { background: rgba(63,185,80,.12);  color: var(--green); }
        .ch-down { background: rgba(248,81,73,.12);  color: var(--red);   }
        .ch-same { background: rgba(125,133,144,.08); color: var(--muted); }

        .row-arrow { color: var(--muted); flex-shrink: 0; }

        /* ─── MODALS ─── */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.72);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 500;
            opacity: 0;
            pointer-events: none;
            transition: opacity .2s;
        }
        .overlay.open { opacity: 1; pointer-events: all; }

        .modal {
            background: #161b22;
            border: 1px solid var(--border2);
            border-radius: 16px;
            padding: 26px 28px;
            width: 100%;
            max-width: 500px;
            max-height: 92vh;
            overflow-y: auto;
            transform: translateY(12px) scale(.97);
            transition: transform .2s;
        }
        .overlay.open .modal { transform: translateY(0) scale(1); }

        .modal-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 22px;
        }
        .modal-head h2 { font-size: 17px; font-weight: 700; }
        .close-btn {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 19px;
            line-height: 1;
            padding: 2px;
            transition: color .15s;
        }
        .close-btn:hover { color: var(--text); }

        /* detail */
        .detail-flex { display: flex; gap: 22px; align-items: flex-start; }
        .detail-skin { flex-shrink: 0; text-align: center; }
        .detail-skin-label { font-size: 11px; color: var(--muted); margin-top: 6px; }

        .detail-right { flex: 1; }
        .detail-rank-label { font-size: 11.5px; color: var(--muted); margin-bottom: 4px; }
        .detail-title { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
        .detail-sub { font-size: 13px; color: var(--muted2); margin-bottom: 18px; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-box { background: var(--bg); border: 1px solid var(--border); border-radius: 9px; padding: 12px; }
        .stat-lbl { font-size: 10.5px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
        .stat-val { font-size: 17px; font-weight: 700; }

        /* forms */
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 12.5px; color: var(--muted2); font-weight: 500; margin-bottom: 6px; }
        .form-group input, .form-group select {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border2);
            border-radius: 8px;
            padding: 9px 13px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 13.5px;
            outline: none;
            transition: border-color .2s;
        }
        .form-group input:focus, .form-group select:focus { border-color: var(--blue); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        /* buttons */
        .btn {
            padding: 9px 18px;
            border-radius: 8px;
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 13.5px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .15s, transform .1s, background .15s;
        }
        .btn:active { transform: scale(.96); }
        .btn-primary { background: var(--blue); color: #fff; }
        .btn-primary:hover { opacity: .88; }
        .btn-success { background: var(--green); color: #fff; }
        .btn-success:hover { opacity: .88; }
        .btn-danger { background: var(--red); color: #fff; }
        .btn-danger:hover { opacity: .88; }
        .btn-ghost { background: transparent; border: 1px solid var(--border2); color: var(--text); }
        .btn-ghost:hover { background: var(--card-hover); }
        .btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

        /* admin list */
        .admin-list { display: flex; flex-direction: column; gap: 7px; max-height: 380px; overflow-y: auto; padding-right: 4px; }
        .admin-item {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 9px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .admin-rank { width: 22px; text-align: center; font-weight: 700; color: var(--muted); font-size: 13px; flex-shrink: 0; }
        .admin-av { width: 30px; height: 30px; border-radius: 4px; image-rendering: pixelated; flex-shrink: 0; }
        .admin-info { flex: 1; min-width: 0; }
        .admin-name { font-weight: 600; font-size: 13.5px; }
        .admin-title { font-size: 11px; color: var(--muted); }
        .admin-btns { display: flex; gap: 5px; flex-shrink: 0; }
        .ic-btn {
            background: none;
            border: 1px solid var(--border2);
            border-radius: 6px;
            padding: 4px 7px;
            color: var(--muted2);
            cursor: pointer;
            font-size: 12px;
            transition: all .15s;
        }
        .ic-btn:hover { border-color: var(--blue); color: var(--blue); }
        .ic-btn.del:hover { border-color: var(--red); color: var(--red); }
        .ic-btn:disabled { opacity: .3; cursor: default; }
        .ic-btn:disabled:hover { border-color: var(--border2); color: var(--muted2); }

        /* admin login */
        .admin-login-wrap { text-align: center; padding: 10px 0 4px; }
        .admin-login-wrap p { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
        #adminErr { color: var(--red); font-size: 12.5px; margin-top: 8px; min-height: 18px; }

        /* admin header row */
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .admin-header h3 { font-size: 14px; font-weight: 600; color: var(--muted2); }

        /* no results */
        .no-res { text-align: center; padding: 50px 20px; color: var(--muted); font-size: 13.5px; }

        /* admin fab */
        .fab {
            position: fixed;
            bottom: 22px;
            right: 22px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--card);
            border: 1px solid var(--border2);
            color: var(--muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all .2s;
            z-index: 100;
        }
        .fab:hover { border-color: var(--blue); color: var(--blue); box-shadow: 0 0 18px rgba(88,166,255,.2); }

        /* ─── NAV TABS ─── */
        .nav-tabs { display: flex; gap: 3px; }
        .nav-tab {
            background: transparent;
            border: none;
            border-radius: 9px;
            padding: 7px 15px;
            color: var(--muted);
            font-family: 'Inter', sans-serif;
            font-size: 13.5px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 7px;
            transition: all .15s;
        }
        .nav-tab:hover { background: var(--card); color: var(--text); }
        .nav-tab.active { background: var(--card-hover); color: var(--text); }

        /* ─── WIDGETS ─── */
        .widgets-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 22px; }
        .widget { background: var(--card); border: 1px solid var(--border); border-radius: 13px; padding: 18px 20px; }
        .widget-title { font-size: 13px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 7px; }
        .widget-title.green { color: var(--green); }
        .widget-title.red   { color: var(--red);   }
        .widget-entry { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--border); }
        .widget-entry:last-child { border-bottom: none; }
        .widget-rank { font-size: 12px; color: var(--muted); min-width: 28px; flex-shrink: 0; }
        .widget-av { width: 26px; height: 26px; border-radius: 4px; image-rendering: pixelated; flex-shrink: 0; }
        .widget-name { flex: 1; font-size: 13.5px; font-weight: 600; }
        .widget-badge { font-size: 12px; font-weight: 700; padding: 3px 9px; border-radius: 6px; flex-shrink: 0; }
        .widget-badge.up   { background: rgba(63,185,80,.12);  color: var(--green); }
        .widget-badge.down { background: rgba(248,81,73,.12);  color: var(--red);   }
        .widget-empty { font-size: 12.5px; color: var(--muted); }

        /* ─── PROFILE PAGE ─── */
        .profile-back { display:flex;align-items:center;gap:8px;background:none;border:none;color:var(--muted);cursor:pointer;font-family:'Inter',sans-serif;font-size:13.5px;font-weight:500;padding:0;margin-bottom:28px;transition:color .15s; }
        .profile-back:hover { color:var(--text); }
        .profile-header { display:flex;gap:26px;align-items:flex-start;margin-bottom:30px; }
        .profile-avatar-wrap { position:relative;flex-shrink:0;width:110px;height:210px; }
        .profile-avatar { width:100%;height:100%;border-radius:14px;image-rendering:pixelated;display:block;background:var(--card-hover);border:1px solid var(--border2);object-fit:contain; }
        .profile-rank-ovl { position:absolute;bottom:-10px;right:-14px;width:46px;height:46px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:17px;border:2px solid var(--bg); }
        .profile-rank-ovl.gold   { background:linear-gradient(145deg,#f5c842,#c8860a);color:#fff; }
        .profile-rank-ovl.silver { background:linear-gradient(145deg,#d4dae2,#7e8d9e);color:#fff; }
        .profile-rank-ovl.bronze { background:linear-gradient(145deg,#e0964a,#a05e18);color:#fff; }
        .profile-rank-ovl.def    { background:#21262d;color:var(--muted2);font-size:14px; }
        .profile-name-row { display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap; }
        .profile-name  { font-size:28px;font-weight:800;letter-spacing:-.4px; }
        .profile-sub   { font-size:14px;color:var(--muted2);margin-bottom:14px; }
        .profile-attrs { display:flex;flex-wrap:wrap;gap:6px; }
        .attr-tag { font-size:11.5px;font-weight:600;padding:3px 10px;border-radius:5px;border:1px solid;white-space:nowrap; }

        .profile-tabs { display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:20px; }
        .profile-tab { background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;padding:10px 16px;font-family:'Inter',sans-serif;font-size:13.5px;font-weight:600;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:7px;transition:color .15s,border-color .15s; }
        .profile-tab:hover { color:var(--text); }
        .profile-tab.active { color:var(--text);border-bottom-color:var(--blue); }

        .profile-section { background:var(--card);border:1px solid var(--border);border-radius:13px;padding:22px 24px; }
        .profile-section h3 { font-size:15px;font-weight:700;margin-bottom:14px; }
        .profile-bio { font-size:14px;color:var(--muted2);line-height:1.8;white-space:pre-wrap; }
        .profile-bio-empty { font-size:14px;color:var(--muted);font-style:italic; }

        /* ─── NEWS ─── */
        .news-grid { display: flex; flex-direction: column; gap: 12px; }
        .news-card { background: var(--card); border: 1px solid var(--border); border-radius: 13px; padding: 22px 24px; transition: border-color .15s, transform .15s; }
        .news-card:hover { border-color: var(--border2); transform: translateY(-1px); }
        .news-meta { font-size: 11.5px; color: var(--muted); margin-bottom: 8px; }
        .news-title { font-size: 18px; font-weight: 800; margin-bottom: 10px; letter-spacing: -.2px; }
        .news-body { font-size: 13.5px; color: var(--muted2); line-height: 1.7; white-space: pre-wrap; }

        /* scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

        @keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: translateY(0); } }

        @media (max-width: 580px) {
            .player-points { display: none; }
            .detail-flex { flex-direction: column; }
            .detail-skin { margin: 0 auto; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            nav { padding: 0 14px; }
            #searchInput { width: 160px; }
            .widgets-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- NAV -->
<nav>
    <div class="logo">SB<em>VANILLA</em><br>CHADS</div>
    <div class="nav-divider"></div>
    <div class="nav-tabs">
        <button class="nav-tab active" data-tab="rankings" onclick="switchTab('rankings')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
            Rankings
        </button>
        <button class="nav-tab" data-tab="news" onclick="switchTab('news')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8M15 18h-5M10 6h8v4h-8z"/></svg>
            News
        </button>
    </div>
    <div class="nav-divider"></div>
    <div class="search-wrap" id="searchWrap">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="searchInput" placeholder="Поиск игрока..." oninput="filterRankings()">
    </div>
</nav>

<!-- MAIN -->
<main>
    <!-- Rankings view -->
    <div id="rankingsView">
        <div class="page-title">
            <span style="font-size:22px">🏆</span>
            <h1>Full Rankings</h1>
        </div>
        <p class="page-subtitle" id="pageSubtitle">Загрузка...</p>
        <div class="widgets-row" id="widgetsRow"></div>
        <div id="rankingsList"></div>
    </div>

    <!-- News view -->
    <div id="newsView" style="display:none">
        <div class="page-title">

db.ref('/').on('value', snap => {
    const d = snap.val();

function save()     { db.ref('players').set(players); }
function saveNews() { db.ref('news').set(news); }
function deepClone(x) { return JSON.parse(JSON.stringify(x)); }
function nextId()     { return players.length ? Math.max(...players.map(p=>p.id)) + 1 : 1; }
function nextNewsId() { return news.length    ? Math.max(...news.map(n=>n.id))    + 1 : 1; }

// сортировка по очкам — единственный источник истины для ранга
function getSorted() { return [...players].sort((a, b) => b.points - a.points); }
function getRank(id) { return getSorted().findIndex(p => p.id === id) + 1; }

// ═══════════════ RENDER ═══════════════

function render(q = '') {
    const list   = document.getElementById('rankingsList');
    const sub    = document.getElementById('pageSubtitle');
    const sorted = getSorted();

    let view = q
        ? sorted.filter(p => p.username.toLowerCase().includes(q.toLowerCase()) ||
                              p.title.toLowerCase().includes(q.toLowerCase()))
        : sorted;

    sub.textContent = q
        ? `Найдено: ${view.length} из ${players.length}`
        : `Всего чадов на сервере: ${players.length}`;

    renderWidgets();

    if (!view.length) {
        list.innerHTML = '<div class="no-res">Никого не найдено 🔍</div>';
        return;
    }

    list.innerHTML = view.map((p, vi) => {
        const rank   = sorted.indexOf(p) + 1;
        const rClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : '';

            : p.change < 0
            ? `<div class="change-badge ch-down">↓ ${p.change}</div>`
            : `<div class="change-badge ch-same">— 0</div>`;

        const tagHTML = p.tag
            ? `<span class="player-tag" style="background:${p.tagColor}22;color:${p.tagColor};border:1px solid ${p.tagColor}44">${p.tag}</span>`
            : '';

        return `

                    ${tagHTML}
                </div>
                <div class="player-sub">${esc(p.title)} · <em>${esc(p.subtitle)}</em></div>
            </div>
            <div class="player-points">
                <span class="pts-val">${p.points.toLocaleString('ru')}</span>
                <span class="pts-label">очков</span>
            </div>

        </div>`;
    }).join('');
}

function filterRankings() { render(document.getElementById('searchInput').value.trim()); }

// ═══════════════ TABS ═══════════════

function switchTab(tab) {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    switchView(tab);
    if (tab === 'news') renderNews();
}

function switchView(view) {
    document.getElementById('rankingsView').style.display = view === 'rankings' ? '' : 'none';
    document.getElementById('newsView').style.display     = view === 'news'     ? '' : 'none';
    document.getElementById('profileView').style.display  = view === 'profile'  ? '' : 'none';
    document.getElementById('searchWrap').style.display   = view === 'rankings' ? '' : 'none';
}

// ═══════════════ WIDGETS ═══════════════

function renderWidgets() {
    const sorted   = getSorted();
    const risers   = sorted.filter(p => p.change > 0).sort((a,b) => b.change - a.change).slice(0,3);
    const droppers = sorted.filter(p => p.change < 0).sort((a,b) => a.change - b.change).slice(0,3);
    const row = document.getElementById('widgetsRow');
    if (!row) return;
    if (!risers.length && !droppers.length) { row.innerHTML = ''; return; }

    const entryHTML = (p, type) => {
        const rank = sorted.indexOf(p) + 1;
        const sign = type === 'up' ? `↑ +${p.change}` : `↓ ${p.change}`;
        return `<div class="widget-entry">
            <span class="widget-rank">#${rank}</span>
            <img class="widget-av"
                 src="https://mc-heads.net/avatar/${enc(p.username)}/26"
                 onerror="this.onerror=null;this.src='https://minotar.net/helm/${enc(p.username)}/26'" alt="">
            <span class="widget-name">${esc(p.username)}</span>
            <span class="widget-badge ${type}">${sign}</span>
        </div>`;
    };

    row.innerHTML = `
        <div class="widget">
            <div class="widget-title green">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
                Biggest Risers
            </div>
            ${risers.length ? risers.map(p => entryHTML(p,'up')).join('') : '<div class="widget-empty">Нет данных</div>'}
        </div>
        <div class="widget">
            <div class="widget-title red">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>
                Biggest Drops
            </div>
            ${droppers.length ? droppers.map(p => entryHTML(p,'down')).join('') : '<div class="widget-empty">Нет данных</div>'}
        </div>`;
}

// ═══════════════ NEWS ═══════════════

function renderNews() {
    const list = document.getElementById('newsList');
    if (!list) return;
    if (!news.length) { list.innerHTML = '<div class="no-res">Новостей пока нет 📭</div>'; return; }
    list.innerHTML = `<div class="news-grid">${
        [...news].reverse().map(n => `
        <div class="news-card">

            <div class="news-title">${esc(n.title)}</div>
            <div class="news-body">${esc(n.body)}</div>

}

// ═══════════════ PROFILE VIEW ═══════════════

let currentProfileId = null;

function openDetail(id) {
    const p = players.find(x => x.id === id);
    if (!p) return;
    currentProfileId = id;
    const rank = getRank(id);
    const bClass = rank === 1 ? 'gold' : rank === 2 ? 'silver' : rank === 3 ? 'bronze' : 'def';

    const av = document.getElementById('profileAvatar');
    av.src = `https://mc-heads.net/body/${enc(p.username)}/200`;
    av.onerror = () => { av.src = `https://mc-heads.net/avatar/${enc(p.username)}/200`; av.onerror = null; };
    av.alt = p.username;

    const ovl = document.getElementById('profileRankOvl');
    ovl.className = `profile-rank-ovl ${bClass}`;
    ovl.textContent = rank;

    document.getElementById('profileName').textContent = p.username;

    const chBadge = document.getElementById('profileChangeBadge');
    chBadge.innerHTML = p.change > 0
        ? `<div class="change-badge ch-up">↑ +${p.change}</div>`
        : p.change < 0
        ? `<div class="change-badge ch-down">↓ ${p.change}</div>`
        : `<div class="change-badge ch-same">— 0</div>`;

    document.getElementById('profileSub').textContent = p.title + (p.subtitle ? ' · ' + p.subtitle : '');

    const attrsEl = document.getElementById('profileAttrs');
    const attrs = p.attrs || [];
    const tagChip = p.tag
        ? `<span class="attr-tag" style="background:${p.tagColor}22;color:${p.tagColor};border-color:${p.tagColor}44">${esc(p.tag)}</span>`
        : '';
    attrsEl.innerHTML = tagChip + attrs.map(a =>
        `<span class="attr-tag" style="background:${a.color}22;color:${a.color};border-color:${a.color}44">${esc(a.label)}</span>`
    ).join('');

    document.querySelectorAll('.profile-tab').forEach((t, i) => t.classList.toggle('active', i === 0));
    switchView('profile');
    renderProfileTab('overview', p, rank);
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderProfileTab(tab, p, rank) {
    const content = document.getElementById('profileContent');
    if (tab === 'overview') {
        const chColor = p.change > 0 ? 'var(--green)' : p.change < 0 ? 'var(--red)' : 'var(--muted)';
        const chText  = p.change > 0 ? `↑ +${p.change} позиции` : p.change < 0 ? `↓ ${p.change} позиции` : 'Без изменений';
        const status  = rank===1 ? '👑 Чемпион' : rank<=3 ? '🔥 Топ-3' : rank<=10 ? '⚡ Топ-10' : '🏅 Участник';
        content.innerHTML = `
            <div class="profile-section" style="margin-bottom:12px">
                <h3>Биография</h3>
                ${p.bio ? `<div class="profile-bio">${esc(p.bio)}</div>` : '<div class="profile-bio-empty">Биография не добавлена</div>'}
            </div>
            <div class="profile-section">
                <h3>Статистика</h3>
                <div class="stats-grid">
                    <div class="stat-box"><div class="stat-lbl">Очки</div><div class="stat-val">${p.points.toLocaleString('ru')}</div></div>
                    <div class="stat-box"><div class="stat-lbl">Позиция</div><div class="stat-val">#${rank}</div></div>
                    <div class="stat-box"><div class="stat-lbl">Изменение</div><div class="stat-val" style="color:${chColor};font-size:13px">${chText}</div></div>
                    <div class="stat-box"><div class="stat-lbl">Статус</div><div class="stat-val" style="font-size:13px">${status}</div></div>
                </div>
            </div>`;
    } else {
        const history = p.history || [];
        const peak    = history.length ? Math.min(...history.map(h => h.rank)) : rank;
        const rows    = [...history].reverse().map(h => `
            <tr>
                <td style="color:var(--muted);font-size:12.5px;padding:9px 0;border-bottom:1px solid var(--border)">${h.date}</td>
                <td style="text-align:center;font-weight:700;padding:9px 0;border-bottom:1px solid var(--border)">${h.points.toLocaleString('ru')}</td>
                <td style="text-align:center;padding:9px 0;border-bottom:1px solid var(--border)">
                    <span style="font-weight:700;color:${h.rank===1?'var(--gold)':h.rank<=3?'var(--bronze)':'var(--muted2)'}">#${h.rank}</span>
                </td>
            </tr>`).join('');
        content.innerHTML = `
            <div class="profile-section" style="margin-bottom:12px">
                <h3>Сводка</h3>
                <div class="stats-grid">
                    <div class="stat-box"><div class="stat-lbl">Текущие очки</div><div class="stat-val">${p.points.toLocaleString('ru')}</div></div>
                    <div class="stat-box"><div class="stat-lbl">Позиция</div><div class="stat-val">#${rank}</div></div>
                    <div class="stat-box"><div class="stat-lbl">Пик</div><div class="stat-val" style="color:var(--gold)">#${peak}</div></div>
                    <div class="stat-box"><div class="stat-lbl">Обновлений</div><div class="stat-val">${history.length}</div></div>
                </div>
            </div>
            <div class="profile-section">
                <h3>История очков</h3>
                ${history.length ? `
                <table style="width:100%;border-collapse:collapse">
                    <thead><tr>
                        <th style="text-align:left;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding-bottom:10px;font-weight:600">Дата</th>
                        <th style="text-align:center;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding-bottom:10px;font-weight:600">Очки</th>
                        <th style="text-align:center;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding-bottom:10px;font-weight:600">Позиция</th>
                    </tr></thead>
                    <tbody>${rows}</tbody>
                </table>` : '<div style="font-size:13.5px;color:var(--muted);text-align:center;padding:30px 0">История появится после первого изменения очков в админке</div>'}
            </div>`;
    }
}

function switchProfileTab(tab, btn) {
    document.querySelectorAll('.profile-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    const p = players.find(x => x.id === currentProfileId);
    if (p) renderProfileTab(tab, p, getRank(currentProfileId));
}

function closeProfile() {
    switchView('rankings');
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === 'rankings'));
}

// ═══════════════ ADMIN ═══════════════

function openAdmin() { renderAdmin(); openOverlay('adminOverlay'); }

function renderAdmin() {
    const body = document.getElementById('adminBody');
    if (!adminIn) {
        body.innerHTML = `
            <div class="admin-login-wrap">
                <p>Введите пароль для управления рейтингом</p>
                <div class="form-group"><input type="password" id="passInput" placeholder="Пароль..." onkeydown="if(event.key==='Enter')tryLogin()"></div>
                <button class="btn btn-primary" onclick="tryLogin()">Войти</button>
                <div id="adminErr"></div>
            </div>`;
    } else {
        body.innerHTML = `
            <div class="admin-header">
                <h3>Игроки (${players.length})</h3>
                <button class="btn btn-success" onclick="openEdit(null)">+ Добавить</button>
            </div>
            <div class="admin-list">
                ${getSorted().map((p,i) => `
                <div class="admin-item">
                    <span class="admin-rank">${i+1}</span>
                    <img class="admin-av"
                         src="https://mc-heads.net/avatar/${enc(p.username)}/30"
                         onerror="this.onerror=null;this.src='https://minotar.net/helm/${enc(p.username)}/30'"
                         alt="">
                    <div class="admin-info">
                        <div class="admin-name">${esc(p.username)}</div>
                        <div class="admin-title">${esc(p.title)} · <span style="color:var(--blue)">${p.points.toLocaleString('ru')} очков</span></div>
                    </div>
                    <div class="admin-btns">
                        <button class="ic-btn" onclick="openEdit(${p.id})">✏</button>
                        <button class="ic-btn del" onclick="del(${p.id})">✕</button>
                    </div>
                </div>`).join('')}
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-top:18px;gap:8px">
                <button class="btn btn-ghost" style="font-size:12px" onclick="if(confirm('Сбросить всех игроков к стандартным?')){players=deepClone(DEFAULTS);save();render();renderAdmin()}">Сбросить к стандарту</button>
                <button class="btn btn-ghost" style="color:var(--red);border-color:rgba(248,81,73,.3)" onclick="adminIn=false;renderAdmin()">Выйти</button>
            </div>

            <div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--border)">
                <div class="admin-header">
                    <h3>Новости (${news.length})</h3>
                    <button class="btn btn-success" onclick="openNewsEdit(null)">+ Добавить</button>
                </div>
                <div class="admin-list" style="max-height:220px">
                    ${news.length ? [...news].reverse().map(n => `
                    <div class="admin-item">
                        <div class="admin-info">
                            <div class="admin-name">${esc(n.title)}</div>
                            <div class="admin-title">${esc(n.date)}</div>
                        </div>
                        <div class="admin-btns">
                            <button class="ic-btn" onclick="openNewsEdit(${n.id})">✏</button>
                            <button class="ic-btn del" onclick="delNews(${n.id})">✕</button>
                        </div>
                    </div>`).join('') : '<div style="font-size:12.5px;color:var(--muted);padding:8px">Новостей нет</div>'}
                </div>
            </div>`;
    }
}

function tryLogin() {
    if (document.getElementById('passInput').value === PASS) {
        adminIn = true; renderAdmin();
    } else {
        document.getElementById('adminErr').textContent = 'Неверный пароль!';
    }
}

function del(id) {
    if (!confirm('Удалить игрока из рейтинга?')) return;
    players = players.filter(p=>p.id!==id);
    save(); render(); renderAdmin();
}

// ═══════════════ EDIT MODAL ═══════════════

function openEdit(id) {
    const p = id ? players.find(x=>x.id===id) : null;
    editId = id;
    document.getElementById('editModalTitle').textContent = p ? 'Редактировать игрока' : 'Добавить игрока';
    const attrsStr = (p?.attrs || []).map(a => `${a.label}:${a.color}`).join(', ');
    document.getElementById('editBody').innerHTML = `
        <div class="form-group">
            <label>Minecraft ник *</label>
            <input id="e_user" value="${p?.username||''}" placeholder="например: Dream">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Чад-титул *</label>
                <input id="e_title" value="${esc(p?.title||'')}" placeholder="Абсолютный Чад">
            </div>
            <div class="form-group">
                <label>Подзаголовок</label>
                <input id="e_sub" value="${esc(p?.subtitle||'')}" placeholder="Непобедимый">
            </div>
        </div>
        <div class="form-group">
            <label>Очки <span style="color:var(--muted);font-weight:400">(ранг пересчитается автоматически)</span></label>
            <input id="e_pts" type="number" value="${p?.points??1000}" min="0">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Тег (необязательно)</label>
                <input id="e_tag" value="${esc(p?.tag||'')}" placeholder="CHAD">
            </div>
            <div class="form-group">
                <label>Цвет тега</label>
                <input id="e_color" type="color" value="${p?.tagColor||'#58a6ff'}" style="padding:4px 6px;height:40px">
            </div>
        </div>
        <div class="form-group">
            <label>Атрибуты профиля <span style="color:var(--muted);font-weight:400">(метка:цвет, через запятую)</span></label>
            <input id="e_attrs" value="${esc(attrsStr)}" placeholder="PvP:#f85149, Builder:#3fb950, Trader:#f0a500">
        </div>
        <div class="form-group">
            <label>Биография</label>
            <textarea id="e_bio" rows="3" style="width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:9px 13px;color:var(--text);font-family:'Inter',sans-serif;font-size:13.5px;outline:none;resize:vertical;transition:border-color .2s" onfocus="this.style.borderColor='var(--blue)'" onblur="this.style.borderColor='var(--border2)'">${esc(p?.bio||'')}</textarea>
        </div>
        <div class="btn-row">
            <button class="btn btn-ghost" onclick="closeOverlay('editOverlay')">Отмена</button>
            <button class="btn btn-primary" onclick="saveEdit()">Сохранить</button>
        </div>`;
    openOverlay('editOverlay');
}

function saveEdit() {
    const username = document.getElementById('e_user').value.trim();
    const title    = document.getElementById('e_title').value.trim();
    if (!username || !title) { alert('Заполните обязательные поля (ник и титул)!'); return; }

    const data = {
        username,
        title,
        subtitle: document.getElementById('e_sub').value.trim(),
        points:   parseInt(document.getElementById('e_pts').value) || 0,
        tag:      document.getElementById('e_tag').value.trim().toUpperCase(),
        tagColor: document.getElementById('e_color').value,
        attrs:    parseAttrs(document.getElementById('e_attrs').value),
        bio:      document.getElementById('e_bio').value.trim(),
    };

    const today = new Date().toLocaleDateString('ru-RU');
    if (editId) {
        // Снимок рангов И очков всех игроков ДО изменения
        const oldRanks  = {};
        const oldPtsMap = {};
        getSorted().forEach((p, idx) => {
            oldRanks[p.id]  = idx + 1;
            oldPtsMap[p.id] = p.points;
        });

        const i             = players.findIndex(p => p.id === editId);
        const oldPts        = players[i].points;
        players[i]          = { ...players[i], ...data };
        const pointsChanged = data.points !== oldPts;

        // Пересчитываем change для ВСЕХ + добавляем историю вытесненным игрокам
        getSorted().forEach((p, idx) => {
            const ni       = players.findIndex(x => x.id === p.id);
            const newRankP = idx + 1;
            const oldRankP = oldRanks[p.id] ?? newRankP;
            players[ni].change = oldRankP - newRankP;

            if (pointsChanged && oldRankP !== newRankP && p.id !== editId) {
                if (!players[ni].history) players[ni].history = [];
                if (players[ni].history.length === 0) {
                    players[ni].history.push({ date: today, points: oldPtsMap[p.id], rank: oldRankP });
                }
                players[ni].history.push({ date: today, points: players[ni].points, rank: newRankP });
            }
        });

        // История для самого редактируемого игрока
        if (pointsChanged) {
            if (!players[i].history) players[i].history = [];
            if (players[i].history.length === 0) {
                players[i].history.push({ date: today, points: oldPts, rank: oldRanks[editId] });
            }
            players[i].history.push({ date: today, points: data.points, rank: getRank(editId) });
        }
    } else {
        const newP = { id: nextId(), ...data, change: 0, history: [] };
        players.push(newP);
        newP.history.push({ date: today, points: newP.points, rank: getRank(newP.id) });
    }

    save(); render(); renderAdmin();
    closeOverlay('editOverlay');
}

// ═══════════════ NEWS ADMIN ═══════════════

function openNewsEdit(id) {
    const n = id ? news.find(x=>x.id===id) : null;
    newsEditId = id;
    document.getElementById('editModalTitle').textContent = n ? 'Редактировать новость' : 'Новая новость';
    const today = new Date().toLocaleDateString('ru-RU');
    document.getElementById('editBody').innerHTML = `
        <div class="form-group">
            <label>Заголовок *</label>
            <input id="n_title" value="${esc(n?.title||'')}" placeholder="Заголовок новости">
        </div>
        <div class="form-group">
            <label>Дата</label>
            <input id="n_date" value="${esc(n?.date||today)}" placeholder="${today}">
        </div>
        <div class="form-group">
            <label>Текст *</label>
            <textarea id="n_body" rows="5" style="width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:9px 13px;color:var(--text);font-family:'Inter',sans-serif;font-size:13.5px;outline:none;resize:vertical;transition:border-color .2s" onfocus="this.style.borderColor='var(--blue)'" onblur="this.style.borderColor='var(--border2)'">${esc(n?.body||'')}</textarea>
        </div>
        <div class="btn-row">
            <button class="btn btn-ghost" onclick="closeOverlay('editOverlay')">Отмена</button>
            <button class="btn btn-primary" onclick="saveNewsEdit()">Сохранить</button>
        </div>`;
    openOverlay('editOverlay');
}

function saveNewsEdit() {
    const title = document.getElementById('n_title').value.trim();
    const body  = document.getElementById('n_body').value.trim();
    if (!title || !body) { alert('Заполните заголовок и текст!'); return; }
    const data = { title, date: document.getElementById('n_date').value.trim() || new Date().toLocaleDateString('ru-RU'), body };
    if (newsEditId) {
        const i = news.findIndex(n=>n.id===newsEditId);
        news[i] = { ...news[i], ...data };
    } else {
        news.push({ id: nextNewsId(), ...data });
    }
    saveNews(); renderAdmin();
    if (document.getElementById('newsView').style.display !== 'none') renderNews();
    closeOverlay('editOverlay');
}

function delNews(id) {
    if (!confirm('Удалить новость?')) return;
    news = news.filter(n=>n.id!==id);
    saveNews(); renderAdmin();
    if (document.getElementById('newsView').style.display !== 'none') renderNews();
}

// ═══════════════ OVERLAY HELPERS ═══════════════

function openOverlay(id)  { document.getElementById(id).classList.add('open'); document.body.style.overflow='hidden'; }
function closeOverlay(id) {
    document.getElementById(id).classList.remove('open');
    if (!document.querySelector('.overlay.open')) document.body.style.overflow='';
}
function overlayClick(e, id) { if (e.target.id===id) closeOverlay(id); }

// ═══════════════ UTILS ═══════════════

function esc(s='') { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function enc(s='') { return encodeURIComponent(s); }

function parseAttrs(str) {
    if (!str.trim()) return [];
    return str.split(',').map(s => {
        const idx = s.lastIndexOf(':');
        if (idx < 1) return null;
        return { label: s.slice(0, idx).trim(), color: s.slice(idx + 1).trim() };
    }).filter(Boolean);
}
</script>
